name = "yaps"
compatibility_date = "2026-03-17"

[assets]
directory = "./public"
html_handling = "auto-trailing-slash"
not_found_handling = "404-page"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

[limits]
cpu_ms = 5000